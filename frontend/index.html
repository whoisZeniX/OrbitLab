<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OrbitLab</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<canvas id="c"></canvas>
<div id="sidebar">
  <h2>OrbitLab</h2>
  <div class="section">
    <h3>Mission</h3>
    <label>Target:
      <select id="mission">
        <option value="Mars">Mars Landing</option>
        <option value="Jupiter">Jupiter Flyby</option>
        <option value="Moon">Lunar Approach</option>
      </select>
    </label>
  </div>
  <div class="section">
    <h3>Launch Config</h3>
    <label>Angle: <span id="angVal">0</span> deg
      <input type="range" id="ang" min="0" max="360" value="0">
    </label>
    <label>Speed: <span id="spdVal">50</span>
      <input type="range" id="spd" min="0" max="200" value="50">
    </label>
    <button id="btn">Launch</button>
  </div>
  <div class="section">
    <h3>Flight Data</h3>
    <div id="stats">Awaiting launch...</div>
  </div>
  <div id="msg"></div>
  <div class="section">
    <h3>Controls</h3>
    <p class="hint">WASD or Arrow Keys to thrust during flight. Fuel is limited.</p>
    <p class="hint">Scroll to zoom. Drag to pan.</p>
  </div>
</div>
<script src="simulation/planets.js"></script>
<script src="simulation/spacecraft.js"></script>
<script src="main.js"></script>
</body>
</html>
